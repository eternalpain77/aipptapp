<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 演讲稿生成 PPT 助手</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --card: #1f2937;
      --muted: #94a3b8;
      --text: #e5eefb;
      --primary: #38bdf8;
      --primary-2: #22c55e;
      --border: rgba(255,255,255,.12);
      --danger: #fb7185;
      --shadow: 0 10px 30px rgba(0,0,0,.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #111827 50%, #0b1220 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      width: min(1200px, 92vw);
      margin: 32px auto;
    }
    .hero {
      margin-bottom: 20px;
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: rgba(17,24,39,.78);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }
    h1,h2,h3,p { margin: 0; }
    .hero h1 { font-size: clamp(28px, 4vw, 44px); margin-bottom: 12px; }
    .hero p { color: var(--muted); line-height: 1.7; max-width: 800px; }
    .grid {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 20px;
      align-items: start;
    }
    .panel {
      background: rgba(17,24,39,.88);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .panel h2 { font-size: 20px; margin-bottom: 16px; }
    .field { margin-bottom: 14px; }
    .label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #cbd5e1;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
    }
    textarea { resize: vertical; min-height: 90px; }
    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s ease;
    }
    .btn-primary { background: linear-gradient(135deg, var(--primary), #2563eb); color: white; }
    .btn-secondary { background: #1e293b; color: #dbeafe; border: 1px solid var(--border); }
    .btn-success { background: linear-gradient(135deg, var(--primary-2), #16a34a); color: white; }
    .btn-danger { background: rgba(251,113,133,.14); color: #fecdd3; border: 1px solid rgba(251,113,133,.25); }
    button:hover { transform: translateY(-1px); }
    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }
    .preview-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #cbd5e1;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      border-radius: 999px;
      padding: 8px 12px;
    }
    .slides {
      display: grid;
      gap: 18px;
      max-height: calc(100vh - 220px);
      overflow: auto;
      padding-right: 4px;
    }
    .slide {
      background: linear-gradient(160deg, #f8fafc, #e2e8f0);
      color: #0f172a;
      border-radius: 20px;
      min-height: 360px;
      padding: 26px;
      box-shadow: 0 14px 30px rgba(0,0,0,.22);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .slide::after {
      content: "";
      position: absolute;
      inset: auto -40px -40px auto;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(56,189,248,.18), transparent 70%);
    }
    .slide-cover {
      background: linear-gradient(135deg, #0f172a, #1d4ed8 55%, #38bdf8);
      color: white;
      justify-content: center;
    }
    .slide-cover::after {
      background: radial-gradient(circle, rgba(255,255,255,.16), transparent 70%);
    }
    .slide-no { font-size: 12px; opacity: .7; margin-bottom: 12px; }
    .slide-title { font-size: 30px; font-weight: 800; line-height: 1.2; margin-bottom: 12px; }
    .slide-subtitle { font-size: 15px; color: inherit; opacity: .84; line-height: 1.7; }
    .slide-section-title { font-size: 24px; font-weight: 800; margin-bottom: 16px; }
    .bullets { margin: 0; padding-left: 22px; line-height: 1.8; font-size: 16px; }
    .bullets li { margin-bottom: 8px; }
    .split {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 18px;
      align-items: stretch;
      margin-top: 10px;
    }
    .mini-card {
      border: 1px solid rgba(15,23,42,.08);
      background: rgba(255,255,255,.72);
      border-radius: 16px;
      padding: 16px;
    }
    .mini-card h4 { margin: 0 0 8px; font-size: 14px; color: #475569; }
    .mini-card p { font-size: 15px; line-height: 1.7; color: #0f172a; }
    .theme-chip {
      display: inline-block;
      margin-bottom: 12px;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.16);
      border: 1px solid rgba(255,255,255,.2);
    }
    .empty {
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 18px;
      padding: 30px;
    }
    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .slides { max-height: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>AI 演讲稿生成 PPT 助手</h1>
      <p>这是一个可正常使用的初代作品：输入主题、演讲内容和细节要求，应用会自动生成 PPT 大纲与逐页内容预览，并支持导出为可继续编辑的 .pptx 文件。浏览器端可直接下载 PPT，导出能力基于 PptxGenJS 的浏览器写文件能力实现。[web:41][web:50]</p>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>生成设置</h2>
        <div class="field">
          <label class="label">主题</label>
          <input id="topic" placeholder="例如：人工智能对大学生学习方式的影响" />
        </div>
        <div class="field">
          <label class="label">演讲内容 / 讲稿</label>
          <textarea id="content" placeholder="请粘贴你的演讲稿，或至少输入几段核心内容。内容越具体，生成效果越好。" style="min-height:120px"></textarea>
        </div>
        <div class="field">
          <label class="label">补充要求或细节</label>
          <textarea id="extra" placeholder="例如：老师要求有案例、结尾要有建议、希望颜色偏蓝色、适合大学课堂展示等"></textarea>
        </div>
        <div class="actions">
          <button class="btn-primary" id="generateBtn">生成 PPT 预览</button>
          <button class="btn-secondary" id="demoBtn">填入示例</button>
          <button class="btn-success" id="exportBtn">导出 PPTX</button>
          <button class="btn-danger" id="resetBtn">清空</button>
        </div>
        <div class="hint">
          点击「生成 PPT 预览」后会调用后端 AI 模型生成大纲，请稍候几秒。导出 PPTX 基于 PptxGenJS 浏览器端能力。
        </div>
      </div>

      <div class="panel">
        <div class="preview-head">
          <h2>预览区</h2>
          <div class="badge"><span id="slideCount">0</span> 页已生成</div>
        </div>
        <div id="slides" class="slides">
          <div class="empty">先填写左侧信息，再点击“生成 PPT 预览”。</div>
        </div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    let generatedSlides = [];

    const demo = {
      topic: '人工智能对大学生学习方式的影响',
      content: '人工智能正在改变大学生获取知识、整理信息和完成作业的方式。过去学生更多依赖搜索引擎和纸质资料，现在越来越多的人使用AI工具进行资料总结、生成提纲、润色表达和模拟问答。AI的优势在于提高效率、降低信息处理成本，并帮助学生更快进入学习状态。但如果过度依赖AI，也可能带来独立思考减弱、作业同质化、学术诚信风险等问题。因此，大学生需要学会合理使用AI，将其作为辅助工具，而不是替代自己的思考与判断。',
      extra: '老师希望有背景、现状、优势、风险、建议和总结；整体风格简洁；适合大学课堂演讲。'
    };

    function splitSentences(text) {
      return text
        .replace(/\n+/g, ' ')
        .split(/[。！？!?；;]+/)
        .map(s => s.trim())
        .filter(Boolean);
    }

    function chunk(arr, size) {
      const out = [];
      for (let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
      return out;
    }

    function summarizeSentence(s, max = 28) {
      return s.length <= max ? s : s.slice(0, max) + '…';
    }

    function buildDeck(data) {
      const targetPages = parseInt(data.pages, 10);
      const sentences = splitSentences(data.speech || '');
      const detailSentences = splitSentences(data.details || '');
      const contentPool = [...sentences, ...detailSentences].filter(Boolean);

      const titleKeywords = [
        '研究背景与问题提出',
        '当前现状与核心表现',
        '主要优势与积极影响',
        '潜在问题与现实风险',
        '典型案例与应用场景',
        '解决思路与优化建议',
        '总结与行动呼吁'
      ];

      const slides = [];
      slides.push({
        type: 'cover',
        title: data.topic,
        subtitle: `${data.scene} · ${data.style} · ${data.duration || '未填写时长'}`,
        bullets: []
      });

      const contentSlideCount = Math.max(targetPages - 3, 2);
      const groups = chunk(contentPool.length ? contentPool : ['请补充更具体的演讲内容，系统将自动拆分为逐页要点。'], Math.max(1, Math.ceil((contentPool.length || 1) / contentSlideCount)));

      slides.push({
        type: 'agenda',
        title: '汇报目录',
        bullets: Array.from({ length: Math.min(contentSlideCount, titleKeywords.length) }, (_, i) => `${i + 1}. ${titleKeywords[i]}`)
      });

      for (let i = 0; i < contentSlideCount; i++) {
        const group = groups[i] || [];
        const bullets = group.slice(0, 4).map(summarizeSentence);
        slides.push({
          type: 'content',
          title: titleKeywords[i] || `内容分析 ${i + 1}`,
          bullets: bullets.length ? bullets : ['本页内容等待用户补充更多细节后自动优化。'],
          note: group[0] || ''
        });
      }

      slides.push({
        type: 'summary',
        title: '总结与建议',
        bullets: [
          `围绕“${data.topic}”形成了从背景到建议的完整表达结构。`,
          '使用 AI 可以显著提升准备 PPT 的效率，但内容判断仍需人工把关。',
          '建议后续加入图片推荐、自动配图和讲稿备注功能，继续增强实用性。'
        ]
      });

      return slides.slice(0, targetPages);
    }

    function renderSlides(slides) {
      const container = $('slides');
      $('slideCount').textContent = slides.length;
      container.innerHTML = '';

      slides.forEach((slide, index) => {
        const el = document.createElement('section');
        el.className = 'slide' + (slide.type === 'cover' ? ' slide-cover' : '');

        if (slide.type === 'cover') {
          el.innerHTML = `
            <div class="theme-chip">${$('style').value}</div>
            <div class="slide-no">第 ${index + 1} 页 / 封面</div>
            <div class="slide-title">${escapeHtml(slide.title)}</div>
            <div class="slide-subtitle">${escapeHtml(slide.subtitle)}</div>
          `;
        } else if (slide.type === 'agenda') {
          el.innerHTML = `
            <div class="slide-no">第 ${index + 1} 页 / 目录</div>
            <div class="slide-section-title">${escapeHtml(slide.title)}</div>
            <ol class="bullets">${slide.bullets.map(b => `<li>${escapeHtml(b)}</li>`).join('')}</ol>
          `;
        } else {
          el.innerHTML = `
            <div class="slide-no">第 ${index + 1} 页</div>
            <div class="slide-section-title">${escapeHtml(slide.title)}</div>
            <div class="split">
              <div>
                <ul class="bullets">${slide.bullets.map(b => `<li>${escapeHtml(b)}</li>`).join('')}</ul>
              </div>
              <div class="mini-card">
                <h4>演讲提示</h4>
                <p>${escapeHtml(slide.note || '本页适合配合口头说明展开讲解，并根据课堂要求补充案例或数据。')}</p>
              </div>
            </div>
          `;
        }
        container.appendChild(el);
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function gatherForm() {
      return {
        topic: $('topic').value.trim(),
        scene: $('scene').value,
        style: $('style').value,
        pages: $('pages').value,
        duration: $('duration').value.trim(),
        speech: $('speech').value.trim(),
        details: $('details').value.trim()
      };
    }

    function validate(data) {
      if (!data.topic) return '请先填写主题。';
      if (!data.speech && !data.details) return '请至少填写演讲内容或补充细节。';
      return '';
    }

    async function exportPPT() {
      if (!generatedSlides.length) {
        alert('请先生成 PPT 预览。');
        return;
      }
      if (!window.PptxGenJS) {
        alert('PPT 导出库加载失败，请检查网络后重试。');
        return;
      }

      const pptx = new PptxGenJS();
      pptx.layout = 'LAYOUT_WIDE';
      pptx.author = 'Perplexity';
      pptx.company = 'Perplexity';
      pptx.subject = gatherForm().topic;
      pptx.title = gatherForm().topic;
      pptx.lang = 'zh-CN';
      pptx.theme = {
        headFontFace: 'Microsoft YaHei',
        bodyFontFace: 'Microsoft YaHei',
        lang: 'zh-CN'
      };

      generatedSlides.forEach((s, idx) => {
        const slide = pptx.addSlide();
        if (s.type === 'cover') {
          slide.background = { color: '0F172A' };
          slide.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 13.33, h: 7.5, fill: { color: '0F172A' }, line: { color: '0F172A' } });
          slide.addText('AI 演讲稿生成 PPT 助手', { x: 0.7, y: 0.55, w: 4.8, h: 0.4, fontSize: 16, color: '7DD3FC', bold: true });
          slide.addText(s.title, { x: 0.7, y: 1.55, w: 10.8, h: 1.2, fontSize: 24, color: 'FFFFFF', bold: true, breakLine: false, margin: 0.05 });
          slide.addText(s.subtitle, { x: 0.72, y: 3.0, w: 8.6, h: 0.6, fontSize: 12, color: 'CBD5E1' });
          slide.addText('输入主题、讲稿和细节后自动生成', { x: 0.72, y: 5.9, w: 5.5, h: 0.4, fontSize: 11, color: '94A3B8' });
          slide.addShape(pptx.ShapeType.ellipse, { x: 10.4, y: 0.6, w: 2.0, h: 2.0, fill: { color: '38BDF8', transparency: 30 }, line: { color: '38BDF8', transparency: 100 } });
          slide.addShape(pptx.ShapeType.ellipse, { x: 9.6, y: 4.7, w: 2.7, h: 2.0, fill: { color: '2563EB', transparency: 35 }, line: { color: '2563EB', transparency: 100 } });
        } else {
          slide.background = { color: 'F8FAFC' };
          slide.addText(s.title, { x: 0.6, y: 0.45, w: 7.4, h: 0.45, fontSize: 22, color: '0F172A', bold: true });
          slide.addShape(pptx.ShapeType.line, { x: 0.6, y: 1.02, w: 12.0, h: 0, line: { color: 'CBD5E1', pt: 1.2 } });

          if (s.type === 'agenda') {
            s.bullets.forEach((b, i) => {
              slide.addText(b, { x: 1.0, y: 1.45 + i * 0.68, w: 8.4, h: 0.35, fontSize: 18, color: '1E293B', bullet: { indent: 14 } });
            });
          } else {
            slide.addShape(pptx.ShapeType.roundRect, { x: 0.68, y: 1.38, w: 7.4, h: 4.95, rectRadius: 0.08, fill: { color: 'FFFFFF' }, line: { color: 'E2E8F0', pt: 1 } });
            slide.addShape(pptx.ShapeType.roundRect, { x: 8.35, y: 1.38, w: 4.25, h: 4.95, rectRadius: 0.08, fill: { color: 'EFF6FF' }, line: { color: 'BFDBFE', pt: 1 } });
            s.bullets.forEach((b, i) => {
              slide.addText(b, { x: 1.0, y: 1.75 + i * 0.85, w: 6.6, h: 0.45, fontSize: 16, color: '1E293B', bullet: { indent: 16 } });
            });
            slide.addText('演讲提示', { x: 8.7, y: 1.75, w: 2.3, h: 0.3, fontSize: 15, color: '1D4ED8', bold: true });
            slide.addText(s.note || '本页适合结合讲解展开。', { x: 8.7, y: 2.15, w: 3.2, h: 2.8, fontSize: 13, color: '334155', breakLine: true, margin: 0.05, valign: 'top' });
          }
          slide.addText(`${idx + 1}`, { x: 12.1, y: 6.9, w: 0.4, h: 0.2, fontSize: 10, color: '94A3B8', align: 'right' });
        }
      });

      await pptx.writeFile({ fileName: `${safeFileName(gatherForm().topic || 'AI-PPT')}.pptx`, compression: true });
    }

    function safeFileName(name) {
      return name.replace(/[\\/:*?"<>|]/g, '_').slice(0, 60);
    }

    // 调用后端 AI 接口生成 PPT
    async function generatePPT() {
      const topic = document.getElementById("topic").value;
      const content = document.getElementById("content").value;
      const extra = document.getElementById("extra").value;

      if (!topic && !content) {
        alert("请至少填写主题或演讲内容");
        return;
      }

      $('generateBtn').disabled = true;
      $('generateBtn').textContent = '生成中...';

      try {
        const res = await fetch("https://ai-ppt-backend.onrender.com/api/generate-ppt", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ topic, content, extra })
        });
        const data = await res.json();

        if (!res.ok || !data.ok) {
          alert(data.error || "生成失败，请稍后重试");
          return;
        }

        // 将 AI 返回的结构转为前端幻灯片格式
        const ppt = data.ppt;
        const slides = [];
        // 封面
        slides.push({
          type: 'cover',
          title: ppt.title || topic,
          subtitle: `AI 生成 · ${new Date().toLocaleDateString('zh-CN')}`,
          bullets: []
        });
        // 目录（取前几页标题）
        if (ppt.slides && ppt.slides.length) {
          slides.push({
            type: 'agenda',
            title: '目录',
            bullets: ppt.slides.map((s, i) => `${i + 1}. ${s.title}`).slice(0, 8)
          });
          // 内容页
          ppt.slides.forEach((s, i) => {
            slides.push({
              type: 'content',
              title: s.title,
              bullets: s.bullets || [],
              note: s.bullets ? s.bullets[0] : ''
            });
          });
        }

        generatedSlides = slides;
        renderSlides(generatedSlides);
      } catch (err) {
        console.error(err);
        alert("请求失败，请确认后端服务已启动");
      } finally {
        $('generateBtn').disabled = false;
        $('generateBtn').textContent = '生成 PPT 预览';
      }
    }

    $('generateBtn').addEventListener('click', generatePPT);

    $('demoBtn').addEventListener('click', () => {
      $('topic').value = demo.topic;
      $('content').value = demo.content;
      $('extra').value = demo.extra;
    });

    $('resetBtn').addEventListener('click', () => {
      ['topic','content','extra'].forEach(id => $(id).value = '');
      generatedSlides = [];
      $('slideCount').textContent = '0';
      $('slides').innerHTML = '<div class="empty">先填写左侧信息，再点击"生成 PPT 预览"。</div>';
    });

    $('exportBtn').addEventListener('click', exportPPT);
  </script>
</body>
</html>
