services:
  - type: web
    name: ai-ppt-backend
    runtime: node
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "3000"
      - key: MODEL_API_URL
        value: https://openrouter.ai/api/v1/chat/completions
      - key: MODEL_NAME
        value: openrouter/free
      - key: MODEL_API_KEY
        sync: false
